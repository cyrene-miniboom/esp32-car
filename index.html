<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>esp32小车</title>
  <link rel="stylesheet" href="style.css" />

  <!-- 代码高亮，可选 -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
  />
</head>
<body>
  <header class="hero">
    <h1>esp32小车</h1>
    <p>由esp32控制的小车，能够在手机控制下移动，同时变更表情</p>

    <div class="actions">
      <a href="https://github.com/cyrene-miniboom/esp32-car" target="_blank">
        查看 GitHub
      </a>
      <a href="#demo">
        查看演示
      </a>
    </div>
  </header>

  <main>
    <section id="demo" class="card">
      <h2>项目演示视频</h2>

      <video
        controls
        preload="metadata"
        poster="assets/poster.png"
        width="100%"
      >
        <source src="video/e52a66ea16f138e7de184bc0e08c83ff.mp4" type="video/mp4" />
        你的浏览器不支持 video 标签。
      </video>
    </section>

    <section class="card">
      <h2>核心代码展示</h2>

      <pre><code class="language-js">
function playDemo() {
  const video = document.querySelector("video");
  video.play();
}

console.log("Hello GitHub Pages!");
      </code></pre>
    </section>

    <section class="card">
      <h2>功能特点</h2>
      <ul>
        <li>支持wifi远程控制</li>
        <li>支持显示屏变更表情，文字</li>
        <li>可加装多种传感器</li>
      </ul>
    </section>
  </main>

  <footer>
    <p>© 2026 我的项目</p>
  </footer>

  <script src="main.js"></script>

  <!-- 代码高亮，可选 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    hljs.highlightAll();
  </script>
</body>
</html>
