<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的 GitHub 项目</title>
  <link rel="stylesheet" href="style.css" />

  <!-- 代码高亮，可选 -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
  />
</head>
<body>
  <header class="hero">
    <h1>项目名称</h1>
    <p>一句话介绍你的项目，例如：一个用于演示视频播放和代码展示的 GitHub 项目网页。</p>

    <div class="actions">
      <a href="https://github.com/你的用户名/你的仓库名" target="_blank">
        查看 GitHub
      </a>
      <a href="#demo">
        查看演示
      </a>
    </div>
  </header>

  <main>
    <section id="demo" class="card">
      <h2>项目演示视频</h2>

      <video
        controls
        preload="metadata"
        poster="assets/poster.png"
        width="100%"
      >
        <source src="assets/demo.mp4" type="video/mp4" />
        你的浏览器不支持 video 标签。
      </video>
    </section>

    <section class="card">
      <h2>核心代码展示</h2>

      <pre><code class="language-js">
function playDemo() {
  const video = document.querySelector("video");
  video.play();
}

console.log("Hello GitHub Pages!");
      </code></pre>
    </section>

    <section class="card">
      <h2>功能特点</h2>
      <ul>
        <li>支持视频播放</li>
        <li>支持代码高亮</li>
        <li>适合部署到 GitHub Pages</li>
        <li>纯静态网页，无需后端</li>
      </ul>
    </section>
  </main>

  <footer>
    <p>© 2026 我的项目</p>
  </footer>

  <script src="main.js"></script>

  <!-- 代码高亮，可选 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    hljs.highlightAll();
  </script>
</body>
</html>
